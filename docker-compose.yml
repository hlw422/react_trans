version: '3.8'

services:
  lan-file-transfer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lan-file-transfer
    ports:
      - "3009:3009"
    volumes:
      # 持久化上传的文件
      - ./uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3009
    restart: unless-stopped
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3009/api/network-info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
